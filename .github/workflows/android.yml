name: Android CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Разрешить запуск Gradle wrapper
        working-directory: android
        run: chmod +x gradlew

      - name: Проверить тесты, lint и собрать Android debug APK
        working-directory: android
        run: ./gradlew testDebugUnitTest lintDebug assembleDebug --stacktrace
